<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Resume Builder</title>

<!-- GOOGLE FONT -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS -->

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<h1>AI Resume Builder</h1>

<button id="downloadBtn">

Download PDF

</button>

</div>

<!-- MAIN CONTAINER -->

<div class="container">

<!-- LEFT PANEL -->

<div class="left-panel">

<!-- PERSONAL INFO -->

<div class="card">

<h2>Personal Info</h2>

<div class="photo-upload">

<img id="previewImage">

<label for="imageInput">

Upload Photo

</label>

<input type="file"
id="imageInput"
accept="image/*">

</div>

<input type="text"
id="name"
placeholder="Full Name">

<input type="email"
id="email"
placeholder="Email Address">

<input type="text"
id="phone"
placeholder="Mobile Number">

<input type="text"
id="github"
placeholder="GitHub Link">

<input type="text"
id="linkedin"
placeholder="LinkedIn Link">

<textarea
id="summary"
placeholder="Professional Summary"></textarea>

</div>

<!-- SKILLS -->

<div class="card">

<h2>Skills</h2>

<textarea
id="skills"
placeholder="Technical Skills: Python, Flask, Java

Soft Skills: Leadership, Communication"></textarea>

</div>

<!-- EDUCATION -->

<div class="card">

<div class="heading">

<h2>Education</h2>

<button onclick="addEducation()">

+ Add

</button>

</div>

<div id="educationContainer">

</div>

</div>

<!-- EXPERIENCE -->

<div class="card">

<div class="heading">

<h2>Experience</h2>

<button onclick="addExperience()">

+ Add

</button>

</div>

<div id="experienceContainer">

</div>

</div>

<!-- CERTIFICATIONS -->

<div class="card">

<div class="heading">

<h2>Certifications</h2>

<button onclick="addCertification()">

+ Add

</button>

</div>

<div id="certificationContainer">

</div>

</div>

<!-- PROJECTS -->

<div class="card">

<h2>Projects</h2>

<textarea
id="projects"
placeholder="AI Resume Builder: Developed Flask based resume generator.

PDF Chatbot: Built chatbot for PDF analysis."></textarea>

</div>

<!-- CUSTOM SECTION -->

<div class="card">

<h2>Custom Section</h2>

<input type="text"
id="customTitle"
placeholder="Custom Section Title">

<textarea
id="customContent"
placeholder="Write custom content"></textarea>

</div>

<!-- TEMPLATE -->

<div class="card">

<h2>Resume Template</h2>

<select id="templateSelect">

<option value="template1">

Modern

</option>

<option value="template2">

Professional

</option>

<option value="template3">

Minimal

</option>

</select>

</div>

</div>

<!-- RIGHT PANEL -->

<div class="right-panel">

<div class="resume-preview template1"
id="resumePreview">

<!-- IMAGE -->

<img id="resumeImage">

<!-- NAME -->

<h1 id="previewName">

YOUR NAME

</h1>

<!-- CONTACT -->

<p id="previewContact">

email@gmail.com | 9876543210

</p>

<!-- LINKS -->

<div id="previewLinks">

</div>

<!-- SUMMARY -->

<div>

<h3>SUMMARY</h3>

<p id="previewSummary"></p>

</div>

<!-- SKILLS -->

<div>

<h3>SKILLS</h3>

<p id="previewSkills"></p>

</div>

<!-- EDUCATION -->

<div>

<h3>EDUCATION</h3>

<div id="previewEducation">

</div>

</div>

<!-- EXPERIENCE -->

<div>

<h3>EXPERIENCE</h3>

<div id="previewExperience">

</div>

</div>

<!-- CERTIFICATIONS -->

<div>

<h3>CERTIFICATIONS</h3>

<div id="previewCertification">

</div>

</div>

<!-- PROJECTS -->

<div>

<h3>PROJECTS</h3>

<p id="previewProjects"></p>

</div>

<!-- CUSTOM -->

<div>

<h3 id="previewCustomTitle"></h3>

<p id="previewCustomContent"></p>

</div>

</div>

</div>

</div>

<!-- JAVASCRIPT -->

<script src="{{ url_for('static',
filename='script.js') }}"></script>

</body>
</html>
